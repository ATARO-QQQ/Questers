<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quester's 編集ページ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f6f6f6; font-family: sans-serif; color: #202122; }
        .wiki-header { border-bottom: 1px solid #a2a9b1; margin-bottom: 0.5em; padding-bottom: 0.25em; font-family: "Linux Libertine", "Georgia", "Times", serif; }
        .wiki-link { color: #0645ad; text-decoration: none; cursor: pointer; }
        .wiki-link:hover { text-decoration: underline; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; width: 1.5rem; height: 1.5rem; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- Wiki風サイドバー -->
    <aside class="w-full md:w-48 bg-[#f6f6f6] p-4 flex-shrink-0 border-r border-[#a2a9b1] md:min-h-screen">
        <div class="text-center mb-6 mt-4">
            <h1 class="text-2xl font-serif font-bold text-gray-800">Quester's</h1>
            <p class="text-xs text-gray-500 mt-1">編集用コンソール</p>
        </div>
        <nav class="hidden md:block">
            <ul class="text-sm space-y-2 border-t border-[#a2a9b1] pt-4">
                <li><a href="#" onclick="document.getElementById('edit-form').reset(); document.getElementById('sections-container').innerHTML=''; return false;" class="wiki-link">新規作成クリア</a></li>
                <li><a href="#" onclick="alert('表示用ページへはURLから直接移動してください。'); return false;" class="wiki-link">表示ページ確認</a></li>
            </ul>
            <div class="mt-6 border-t border-[#a2a9b1] pt-4 text-xs text-gray-600">
                <p class="font-bold mb-1">ヘルプ</p>
                <ul class="space-y-1">
                    <li><a href="#" onclick="alert('自由に項目を追加し、画像を挿入できます。'); return false;" class="wiki-link">編集のガイドライン</a></li>
                </ul>
            </div>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 bg-white">
        <!-- Wiki風 タブ部分 -->
        <div class="flex pt-4 px-6 bg-[#f6f6f6] border-b border-[#a2a9b1]">
            <div class="px-4 py-2 bg-white border border-[#a2a9b1] border-b-0 rounded-t relative top-[1px] font-bold text-sm text-[#0645ad]">
                ページを編集
            </div>
        </div>

        <div class="p-6 max-w-4xl">
            <h1 class="wiki-header text-3xl mb-4 text-gray-800">Quester's 記事作成・編集</h1>
            
            <p class="text-sm text-gray-600 mb-6 bg-[#eaecf0] p-3 rounded border border-[#a2a9b1]">
                このページは匿名で新しい研究者の記事を作成するための専用ツールです。<br>
                下の「新しい項目を追加」ボタンを使うことで、Wikipediaのように見出しと画像を持ったセクションをいくつでも自由に追加できます。
            </p>

            <div id="message-container" class="hidden mb-6 p-4 rounded text-sm text-white"></div>

            <form id="edit-form" class="space-y-6">
                <!-- 基本情報セクション -->
                <div class="bg-gray-50 p-4 border border-gray-300 rounded">
                    <h2 class="font-bold text-lg mb-4 border-b pb-2">基本情報 (ページ上部・インフォボックス)</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">研究者名 (ページタイトル) <span class="text-red-500">*</span></label>
                            <input type="text" id="input-name" required class="w-full border border-gray-300 rounded p-2 focus:ring-1 focus:ring-blue-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">肩書き・専門分野</label>
                            <input type="text" id="input-title" placeholder="例: 理論物理学者 / 〇〇大学教授" class="w-full border border-gray-300 rounded p-2 focus:ring-1 focus:ring-blue-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">メイン画像 (プロフィール用)</label>
                            <input type="file" id="input-image" accept="image/jpeg, image/png, image/webp" class="w-full border border-gray-300 rounded p-2 text-sm bg-white">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">概要 (導入テキスト) <span class="text-red-500">*</span></label>
                            <textarea id="input-summary" rows="3" required placeholder="目次の前に表示される、対象の全体的な説明を記載してください。" class="w-full border border-gray-300 rounded p-2 focus:ring-1 focus:ring-blue-500 focus:outline-none"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 動的追加セクション (Wikipediaの目次項目に相当) -->
                <div>
                    <h2 class="font-bold text-lg mb-2 mt-8">詳細項目 (セクション)</h2>
                    <p class="text-xs text-gray-500 mb-4">経歴、研究内容、実績など、項目を分けて記載できます。ここに追加した項目は自動的に目次になります。</p>
                    
                    <div id="sections-container" class="space-y-4">
                        <!-- ここにJSで項目が追加されます -->
                    </div>

                    <button type="button" onclick="addSection()" class="mt-4 px-4 py-2 border border-[#0645ad] text-[#0645ad] hover:bg-[#eaecf0] rounded text-sm font-bold flex items-center transition">
                        <span class="mr-1 text-lg leading-none">+</span> 新しい項目を追加
                    </button>
                </div>

                <div class="pt-8 border-t border-[#a2a9b1]">
                    <button type="submit" id="submit-btn" class="w-full bg-[#0645ad] hover:bg-[#0b0080] text-white font-bold py-3 px-4 rounded flex items-center justify-center transition duration-200">
                        <span>記事を保存して公開する</span>
                        <div id="loading-spinner" class="spinner ml-2 hidden"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = {
  apiKey: "AIzaSyCx9WAPT1zFmJBiuLPrt0AIJseursv2UZs",
  authDomain: "quester-s.firebaseapp.com",
  projectId: "quester-s",
  storageBucket: "quester-s.firebasestorage.app",
  messagingSenderId: "1061152644561",
  appId: "1:1061152644561:web:f18539ce6d9e93205c94f0",
  measurementId: "G-85JQTYY44K"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'questers-app';

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                showMessage("データベースへの接続に失敗しました: " + error.message, true);
                console.error("Auth error:", error);
            }
        }
        initAuth();

        function showMessage(msg, isError = false) {
            const box = document.getElementById('message-container');
            box.classList.remove('hidden', 'bg-red-500', 'bg-green-600');
            box.classList.add(isError ? 'bg-red-500' : 'bg-green-600');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 5000);
            window.scrollTo(0,0);
        }

        // 画像処理関数 (Canvasでリサイズ＆圧縮)
        function processImage(file) {
            return new Promise((resolve, reject) => {
                if (!file) {
                    resolve(null);
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 400; // Wikiサイズ制限
                        let scale = 1;
                        if (img.width > MAX_WIDTH) {
                            scale = MAX_WIDTH / img.width;
                        }
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // 動的セクション追加ロジック
        window.addSection = () => {
            const id = Date.now();
            const container = document.getElementById('sections-container');
            const html = `
                <div class="section-block border border-[#a2a9b1] bg-[#f8f9fa] p-4 relative rounded" id="sec-${id}">
                    <button type="button" onclick="document.getElementById('sec-${id}').remove()" class="absolute top-3 right-3 text-red-600 text-xs border border-red-300 px-2 py-1 bg-white hover:bg-red-50 rounded">削除</button>
                    
                    <div class="mb-3 pr-16">
                        <label class="block font-bold text-sm mb-1 text-gray-800">見出し (項目名)</label>
                        <input type="text" class="sec-heading w-full border border-gray-300 p-2 text-sm rounded focus:ring-1 focus:outline-none" placeholder="例: 生い立ち、研究内容、著書 など">
                    </div>
                    
                    <div class="mb-3">
                        <label class="block font-bold text-sm mb-1 text-gray-800">この項目に挿入する画像 (任意)</label>
                        <input type="file" accept="image/jpeg, image/png, image/webp" class="sec-image w-full text-sm bg-white border border-gray-300 rounded p-1">
                    </div>
                    
                    <div>
                        <label class="block font-bold text-sm mb-1 text-gray-800">本文</label>
                        <textarea class="sec-content w-full border border-gray-300 p-2 text-sm rounded focus:ring-1 focus:outline-none" rows="5" placeholder="詳細な説明を入力してください..."></textarea>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        };

        // フォーム送信処理
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                showMessage("認証が完了していません。少し待ってから再度お試しください。", true);
                return;
            }

            const btn = document.getElementById('submit-btn');
            const spinner = document.getElementById('loading-spinner');
            
            btn.disabled = true;
            btn.classList.add('opacity-70');
            spinner.classList.remove('hidden');

            try {
                const name = document.getElementById('input-name').value;
                const title = document.getElementById('input-title').value;
                const summary = document.getElementById('input-summary').value;
                
                // メイン画像の処理
                const mainFileInput = document.getElementById('input-image');
                const mainImageBase64 = await processImage(mainFileInput.files[0]);

                // 動的セクションのデータ収集
                const sections = [];
                const sectionBlocks = document.querySelectorAll('.section-block');
                
                // 全セクションの画像処理を並行して待機
                const sectionPromises = Array.from(sectionBlocks).map(async (block) => {
                    const heading = block.querySelector('.sec-heading').value.trim();
                    const content = block.querySelector('.sec-content').value.trim();
                    const fileInput = block.querySelector('.sec-image');
                    
                    let secImageBase64 = null;
                    if (fileInput && fileInput.files[0]) {
                        secImageBase64 = await processImage(fileInput.files[0]);
                    }
                    
                    if (heading || content || secImageBase64) {
                        return {
                            heading: heading,
                            content: content,
                            imageBase64: secImageBase64
                        };
                    }
                    return null;
                });

                const processedSections = (await Promise.all(sectionPromises)).filter(sec => sec !== null);

                const docData = {
                    name: name,
                    title: title,
                    summary: summary,
                    imageBase64: mainImageBase64, // 下位互換性のためキー名はそのまま
                    sections: processedSections,
                    createdAt: Date.now()
                };

                const researchersRef = collection(db, 'artifacts', appId, 'public', 'data', 'researchers');
                await addDoc(researchersRef, docData);

                showMessage("記事の保存が完了しました！表示用ページに反映されています。");
                document.getElementById('edit-form').reset();
                document.getElementById('sections-container').innerHTML = ''; // セクションもクリア

            } catch (error) {
                console.error("Error adding document: ", error);
                showMessage("データの保存に失敗しました。(" + error.message + ")", true);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-70');
                spinner.classList.add('hidden');
            }
        });

        // ページ読み込み時にデフォルトで1つセクションを空で用意しておく
        window.addEventListener('DOMContentLoaded', () => {
            addSection();
        });

    </script>
</body>
</html>
